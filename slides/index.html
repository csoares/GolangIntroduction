<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Programming Course - Slide Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/go.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #161b22;
            padding: 0 2rem;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            flex-shrink: 0;
        }

        .header h1 {
            color: #58a6ff;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .lecture-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .lecture-selector label {
            color: #8b949e;
            font-size: 0.9rem;
        }

        select {
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #0d1117;
            color: #c9d1d9;
            cursor: pointer;
            min-width: 200px;
        }

        select:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 1rem;
            overflow: hidden;
        }

        .slide-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .slide-content-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 3rem;
        }

        .slide-content {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #c9d1d9;
        }

        .slide-content h1 {
            color: #58a6ff;
            font-size: 2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #30363d;
            padding-bottom: 0.5rem;
        }

        .slide-content h2 {
            color: #7ee787;
            font-size: 1.5rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .slide-content h3 {
            color: #d29922;
            font-size: 1.25rem;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .slide-content code {
            background: #21262d;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            color: #ff7b72;
            font-size: 0.9em;
        }

        .slide-content pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .slide-content pre code {
            background: transparent;
            color: inherit;
            padding: 1rem;
            display: block;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .slide-content ul, .slide-content ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .slide-content li {
            margin-bottom: 0.4rem;
        }

        .slide-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            border: 1px solid #30363d;
        }

        .slide-content th, .slide-content td {
            border: 1px solid #30363d;
            padding: 0.6rem;
            text-align: left;
        }

        .slide-content th {
            background: #21262d;
            color: #58a6ff;
            font-weight: 600;
        }

        .slide-content tr:nth-child(even) {
            background: #0d1117;
        }

        .slide-content blockquote {
            border-left: 4px solid #58a6ff;
            margin: 1rem 0;
            padding-left: 1rem;
            color: #8b949e;
            font-style: italic;
        }

        .slide-content strong {
            color: #f0883e;
        }

        .slide-content em {
            color: #a371f7;
        }

        .slide-footer {
            background: #0d1117;
            border-top: 1px solid #30363d;
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .slide-number {
            color: #8b949e;
            font-size: 0.85rem;
        }

        .navigation {
            display: flex;
            gap: 0.5rem;
        }

        .nav-btn {
            padding: 0.5rem 1rem;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #c9d1d9;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .nav-btn:hover {
            background: #30363d;
            border-color: #8b949e;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .fullscreen-btn {
            padding: 0.4rem 0.8rem;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #8b949e;
            margin-left: 1rem;
        }

        .fullscreen-btn:hover {
            background: #30363d;
            color: #c9d1d9;
        }

        .keyboard-hint {
            color: #6e7681;
            font-size: 0.8rem;
        }

        .loading {
            text-align: center;
            color: #8b949e;
            font-size: 1.2rem;
            padding: 3rem;
        }

        .error {
            background: #21262d;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        /* Scrollbar styling */
        .slide-content-wrapper::-webkit-scrollbar {
            width: 10px;
        }

        .slide-content-wrapper::-webkit-scrollbar-track {
            background: #0d1117;
        }

        .slide-content-wrapper::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 5px;
        }

        .slide-content-wrapper::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 1rem;
            }

            .header h1 {
                font-size: 1rem;
            }

            .slide-content-wrapper {
                padding: 1rem;
            }

            .slide-content h1 {
                font-size: 1.5rem;
            }

            .slide-content h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Go Programming Course</h1>
        <div style="display: flex; align-items: center;">
            <div class="lecture-selector">
                <label for="lecture-select">Lecture:</label>
                <select id="lecture-select">
                    <option value="">Loading...</option>
                </select>
            </div>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
        </div>
    </div>

    <div class="main-container">
        <div class="slide-container" id="slide-container">
            <div class="slide-content-wrapper" id="slide-content-wrapper">
                <div class="loading">Loading slides...</div>
            </div>
            <div class="slide-footer">
                <div class="keyboard-hint">← → Arrow keys | Space/Enter for next</div>
                <div class="navigation">
                    <button class="nav-btn" id="prev-btn" onclick="prevSlide()">← Previous</button>
                    <button class="nav-btn" id="next-btn" onclick="nextSlide()">Next →</button>
                </div>
                <div class="slide-number" id="slide-number"></div>
            </div>
        </div>
    </div>

    <script>
        const lectures = [
            { file: 'lecture_01_introduction.md', title: '01: Welcome to Go!' },
            { file: 'lecture_02_variables.md', title: '02: Variables and Types' },
            { file: 'lecture_03_control_structures.md', title: '03: Control Structures' },
            { file: 'lecture_04_loops.md', title: '04: Loops' },
            { file: 'lecture_05_functions.md', title: '05: Functions' },
            { file: 'lecture_06_arrays_slices.md', title: '06: Arrays and Slices' },
            { file: 'lecture_07_maps.md', title: '07: Maps' },
            { file: 'lecture_08_structs.md', title: '08: Structs' },
            { file: 'lecture_09_pointers.md', title: '09: Pointers' },
            { file: 'lecture_10_methods_interfaces.md', title: '10: Methods and Interfaces' },
            { file: 'lecture_11_packages_modules.md', title: '11: Packages and Modules' },
            { file: 'lecture_12_error_handling.md', title: '12: Error Handling' },
            { file: 'lecture_13_file_io.md', title: '13: File I/O' },
            { file: 'lecture_14_goroutines.md', title: '14: Goroutines' },
            { file: 'lecture_15_channels.md', title: '15: Channels' }
        ];

        let currentLecture = 0;
        let slides = [];
        let currentSlide = 0;

        // Populate lecture selector
        const select = document.getElementById('lecture-select');
        select.innerHTML = lectures.map((l, i) =>
            `<option value="${i}">${l.title}</option>`
        ).join('');

        select.addEventListener('change', (e) => {
            loadLecture(parseInt(e.target.value));
        });

        // Simple markdown parser
        function parseMarkdown(md) {
            // Escape HTML
            md = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            let html = md
                // Headers
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                // Code blocks with language
                .replace(/```(\w+)?\n([\s\S]*?)```/gim, (match, lang, code) => {
                    const language = lang || 'text';
                    return `<pre><code class="language-${language}">${code.trim()}</code></pre>`;
                })
                // Inline code
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                // Bold/Italic
                .replace(/\*\*\*(.*?)\*\*\*/gim, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                // Blockquotes
                .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
                // Tables
                .replace(/\|(.+)\|/gim, (match) => {
                    const cells = match.split('|').filter(c => c.trim());
                    const isHeader = match.includes('---');
                    if (isHeader) return '';
                    return '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
                })
                // Lists
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                // Paragraphs
                .replace(/\n\n/gim, '</p><p>')
                // Line breaks
                .replace(/\n/gim, '<br>');

            // Wrap lists
            html = html.replace(/(<li>.*<\/li>)/gim, '<ul>$1</ul>');
            html = html.replace(/<\/ul><ul>/gim, '');

            // Wrap tables
            if (html.includes('<tr>')) {
                html = html.replace(/(<tr>.*<\/tr>)/gim, '<table>$1</table>');
                html = html.replace(/<\/table><table>/gim, '');
            }

            return '<div class="slide-content">' + html + '</div>';
        }

        // Split markdown into slides
        function splitSlides(md) {
            const parts = md.split(/---\s*\n/);
            return parts.filter(p => p.trim().length > 0);
        }

        async function loadLecture(index) {
            currentLecture = index;
            select.value = index;

            try {
                const response = await fetch(lectures[index].file);
                if (!response.ok) throw new Error('Failed to load');
                const md = await response.text();

                slides = splitSlides(md);
                currentSlide = 0;
                showSlide();
            } catch (error) {
                document.getElementById('slide-content-wrapper').innerHTML =
                    `<div class="error">Error loading lecture: ${error.message}</div>`;
            }
        }

        function showSlide() {
            const wrapper = document.getElementById('slide-content-wrapper');
            if (slides.length === 0) {
                wrapper.innerHTML = '<div class="error">No slides found</div>';
                return;
            }

            const html = parseMarkdown(slides[currentSlide]);
            wrapper.innerHTML = html;

            // Apply syntax highlighting
            wrapper.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            // Update slide number
            document.getElementById('slide-number').textContent =
                `Slide ${currentSlide + 1} of ${slides.length}`;

            // Update buttons
            document.getElementById('prev-btn').disabled = currentSlide === 0;
            document.getElementById('next-btn').disabled = currentSlide >= slides.length - 1;

            // Scroll to top
            wrapper.scrollTop = 0;
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                showSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                showSlide();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            } else if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
            }
        });

        // Load first lecture
        loadLecture(0);
    </script>
</body>
</html>
