<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Programming Course - Slide Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/go.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #7d8590;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-purple: #a371f7;
            --accent-orange: #f0883e;
            --accent-red: #f85149;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* App Container */
        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .lecture-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .lecture-selector label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select {
            padding: 0.35rem 0.75rem;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            min-width: 180px;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        /* Main Content Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Slide Viewport - fills available space */
        .slide-viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        /* Slide - responsive sizing */
        .slide {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            height: 100%;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Slide Content - scrollable area */
        .slide-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: clamp(1.5rem, 4vw, 4rem);
            font-size: clamp(0.95rem, 1.5vw, 1.25rem);
            line-height: 1.7;
        }

        /* Typography */
        .slide-content h1 {
            color: var(--accent-blue);
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            margin-bottom: clamp(0.75rem, 2vw, 1.5rem);
            padding-bottom: clamp(0.5rem, 1vw, 1rem);
            border-bottom: 3px solid var(--border);
            font-weight: 700;
        }

        .slide-content h2 {
            color: var(--accent-green);
            font-size: clamp(1.2rem, 2.2vw, 1.8rem);
            margin-top: clamp(1rem, 2.5vw, 2rem);
            margin-bottom: clamp(0.5rem, 1vw, 1rem);
            font-weight: 600;
        }

        .slide-content h3 {
            color: var(--accent-purple);
            font-size: clamp(1rem, 1.8vw, 1.4rem);
            margin-top: clamp(0.75rem, 1.5vw, 1.25rem);
            margin-bottom: clamp(0.4rem, 0.8vw, 0.75rem);
            font-weight: 600;
        }

        .slide-content p {
            margin-bottom: clamp(0.75rem, 1.5vw, 1.25rem);
        }

        .slide-content ul, .slide-content ol {
            margin-left: clamp(1.25rem, 2.5vw, 2rem);
            margin-bottom: clamp(0.75rem, 1.5vw, 1.25rem);
        }

        .slide-content li {
            margin-bottom: clamp(0.35rem, 0.7vw, 0.6rem);
        }

        .slide-content li::marker {
            color: var(--accent-blue);
        }

        /* Code */
        .slide-content code {
            background: var(--bg-tertiary);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            color: var(--accent-red);
            font-size: 0.85em;
        }

        .slide-content pre {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-x: auto;
            margin: clamp(0.75rem, 1.5vw, 1.25rem) 0;
        }

        .slide-content pre code {
            background: transparent;
            color: inherit;
            padding: clamp(0.75rem, 1.5vw, 1.25rem);
            display: block;
            font-size: clamp(0.75rem, 1.1vw, 0.95rem);
            line-height: 1.6;
        }

        /* Tables */
        .slide-content table {
            width: 100%;
            border-collapse: collapse;
            margin: clamp(0.75rem, 1.5vw, 1.25rem) 0;
            border: 1px solid var(--border);
            font-size: clamp(0.8rem, 1.2vw, 1rem);
        }

        .slide-content th, .slide-content td {
            border: 1px solid var(--border);
            padding: clamp(0.4rem, 0.8vw, 0.75rem);
            text-align: left;
        }

        .slide-content th {
            background: var(--bg-tertiary);
            color: var(--accent-blue);
            font-weight: 600;
        }

        .slide-content tr:nth-child(even) {
            background: var(--bg-primary);
        }

        /* Blockquote */
        .slide-content blockquote {
            border-left: 4px solid var(--accent-blue);
            margin: clamp(0.75rem, 1.5vw, 1.25rem) 0;
            padding: clamp(0.5rem, 1vw, 1rem) clamp(0.75rem, 1.5vw, 1.25rem);
            background: var(--bg-tertiary);
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Text formatting */
        .slide-content strong {
            color: var(--accent-orange);
            font-weight: 600;
        }

        .slide-content em {
            color: var(--accent-purple);
        }

        /* Slide Footer */
        .slide-footer {
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            padding: clamp(0.5rem, 1vw, 0.75rem) clamp(1rem, 2vw, 2rem);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .slide-counter {
            color: var(--text-secondary);
            font-size: clamp(0.75rem, 1vw, 0.9rem);
            font-weight: 500;
        }

        .slide-counter .current {
            color: var(--accent-blue);
            font-weight: 700;
        }

        /* Navigation Controls */
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn {
            padding: clamp(0.4rem, 0.8vw, 0.6rem) clamp(0.75rem, 1.5vw, 1.25rem);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: clamp(0.8rem, 1.1vw, 0.95rem);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--border);
            border-color: var(--text-secondary);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: var(--bg-primary);
        }

        .nav-btn.primary:hover:not(:disabled) {
            background: #79b8ff;
            border-color: #79b8ff;
        }

        /* Progress Bar */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--border);
            z-index: 10;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            transition: width 0.3s ease;
        }

        /* Loading/Error States */
        .loading, .error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 1.1rem;
            gap: 1rem;
        }

        .error {
            color: var(--accent-red);
        }

        /* Scrollbar */
        .slide-content::-webkit-scrollbar {
            width: 8px;
        }

        .slide-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .slide-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .slide-content::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Keyboard Hint - shown only on hover of footer */
        .keyboard-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        .slide-footer:hover .keyboard-hint {
            opacity: 1;
        }

        /* Fullscreen adjustments */
        :fullscreen .header {
            display: none;
        }

        :fullscreen .slide-viewport {
            padding: 0;
        }

        :fullscreen .slide {
            border-radius: 0;
            border: none;
            max-width: none;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 0.5rem 1rem;
            }

            .logo span {
                display: none;
            }

            select {
                min-width: 140px;
                font-size: 0.85rem;
            }

            .lecture-selector label {
                display: none;
            }

            .slide-viewport {
                padding: 0.5rem;
            }

            .slide-content {
                padding: 1rem;
                font-size: 0.95rem;
            }

            .slide-footer {
                padding: 0.5rem 1rem;
            }

            .nav-btn span {
                display: none;
            }

            .nav-btn {
                padding: 0.5rem 0.75rem;
            }
        }

        /* Small screens */
        @media (max-width: 480px) {
            .slide-content {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .slide-content h1 {
                font-size: 1.25rem;
            }

            .slide-content h2 {
                font-size: 1.1rem;
            }

            .slide-content h3 {
                font-size: 1rem;
            }
        }

        /* Large screens */
        @media (min-width: 1920px) {
            .slide-content {
                padding: 5rem;
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <span>🐹</span>
                    <span>Go Course</span>
                </div>
                <div class="lecture-selector">
                    <label>Lecture</label>
                    <select id="lecture-select">
                        <option value="">Loading...</option>
                    </select>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen (F)">
                    ⛶
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div class="slide-viewport">
                <div class="slide" id="slide">
                    <!-- Slide Content -->
                    <div class="slide-content" id="slide-content">
                        <div class="loading">📡 Loading slides...</div>
                    </div>

                    <!-- Slide Footer -->
                    <div class="slide-footer">
                        <div class="slide-counter">
                            Slide <span class="current" id="current-slide">0</span> / <span id="total-slides">0</span>
                        </div>

                        <div class="nav-controls">
                            <button class="nav-btn" id="prev-btn" onclick="prevSlide()">
                                ← <span>Previous</span>
                            </button>
                            <button class="nav-btn primary" id="next-btn" onclick="nextSlide()">
                                <span>Next</span> →
                            </button>
                        </div>

                        <div class="keyboard-hint">
                            ← → Arrow keys • Space/Enter • F for fullscreen
                        </div>
                    </div>

                    <!-- Progress Bar -->
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const lectures = [
            { file: 'lecture_01_introduction.md', title: '01: Welcome to Go!' },
            { file: 'lecture_02_variables.md', title: '02: Variables and Types' },
            { file: 'lecture_03_control_structures.md', title: '03: Control Structures' },
            { file: 'lecture_04_loops.md', title: '04: Loops' },
            { file: 'lecture_05_functions.md', title: '05: Functions' },
            { file: 'lecture_06_arrays_slices.md', title: '06: Arrays and Slices' },
            { file: 'lecture_07_maps.md', title: '07: Maps' },
            { file: 'lecture_08_structs.md', title: '08: Structs' },
            { file: 'lecture_09_pointers.md', title: '09: Pointers' },
            { file: 'lecture_10_methods_interfaces.md', title: '10: Methods and Interfaces' },
            { file: 'lecture_11_packages_modules.md', title: '11: Packages and Modules' },
            { file: 'lecture_12_error_handling.md', title: '12: Error Handling' },
            { file: 'lecture_13_file_io.md', title: '13: File I/O' },
            { file: 'lecture_14_goroutines.md', title: '14: Goroutines' },
            { file: 'lecture_15_channels.md', title: '15: Channels' }
        ];

        let currentLecture = 0;
        let slides = [];
        let currentSlide = 0;

        // Populate lecture selector
        const select = document.getElementById('lecture-select');
        select.innerHTML = lectures.map((l, i) =>
            `<option value="${i}">${l.title}</option>`
        ).join('');

        select.addEventListener('change', (e) => {
            loadLecture(parseInt(e.target.value));
        });

        // Parse markdown to HTML
        function parseMarkdown(md) {
            // Escape HTML
            md = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            let html = md
                // Headers
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                // Code blocks with language
                .replace(/```(\w+)?\n([\s\S]*?)```/gim, (match, lang, code) => {
                    const language = lang || 'text';
                    return `<pre><code class="language-${language}">${code.trim()}</code></pre>`;
                })
                // Inline code
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                // Bold/Italic
                .replace(/\*\*\*(.*?)\*\*\*/gim, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                // Blockquotes
                .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
                // Tables
                .replace(/\|(.+)\|/gim, (match) => {
                    const cells = match.split('|').filter(c => c.trim());
                    const isHeader = match.includes('---');
                    if (isHeader) return '';
                    return '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
                })
                // Lists
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                // Paragraphs
                .replace(/\n\n/gim, '</p><p>')
                // Line breaks
                .replace(/\n/gim, '<br>');

            // Wrap lists
            html = html.replace(/(<li>.*<\/li>)/gim, '<ul>$1</ul>');
            html = html.replace(/<\/ul><ul>/gim, '');

            // Wrap tables
            if (html.includes('<tr>')) {
                html = html.replace(/(<tr>.*<\/tr>)/gim, '<table>$1</table>');
                html = html.replace(/<\/table><table>/gim, '');
            }

            return html;
        }

        // Split markdown into slides
        function splitSlides(md) {
            const parts = md.split(/---\s*\n/);
            return parts.filter(p => p.trim().length > 0);
        }

        async function loadLecture(index) {
            currentLecture = index;
            select.value = index;

            try {
                const response = await fetch(lectures[index].file);
                if (!response.ok) throw new Error('Failed to load');
                const md = await response.text();

                slides = splitSlides(md);
                currentSlide = 0;
                showSlide();
            } catch (error) {
                document.getElementById('slide-content').innerHTML =
                    `<div class="error">❌ Error loading lecture: ${error.message}</div>`;
            }
        }

        function updateProgress() {
            const progress = slides.length > 0 ? ((currentSlide + 1) / slides.length) * 100 : 0;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }

        function showSlide() {
            const content = document.getElementById('slide-content');
            if (slides.length === 0) {
                content.innerHTML = '<div class="error">No slides found</div>';
                return;
            }

            const html = parseMarkdown(slides[currentSlide]);
            content.innerHTML = html;

            // Apply syntax highlighting
            content.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            // Update counters
            document.getElementById('current-slide').textContent = currentSlide + 1;
            document.getElementById('total-slides').textContent = slides.length;

            // Update buttons
            document.getElementById('prev-btn').disabled = currentSlide === 0;
            document.getElementById('next-btn').disabled = currentSlide >= slides.length - 1;

            // Update progress
            updateProgress();

            // Scroll to top
            content.scrollTop = 0;
        }

        function nextSlide() {
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                showSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                showSlide();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            // Ignore if user is typing in a form
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

            switch(e.key) {
                case 'ArrowRight':
                case ' ':
                case 'Enter':
                    e.preventDefault();
                    nextSlide();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    prevSlide();
                    break;
                case 'Home':
                    e.preventDefault();
                    currentSlide = 0;
                    showSlide();
                    break;
                case 'End':
                    e.preventDefault();
                    currentSlide = slides.length - 1;
                    showSlide();
                    break;
                case 'f':
                case 'F':
                    toggleFullscreen();
                    break;
            }
        });

        // Load first lecture
        loadLecture(0);
    </script>
</body>
</html>
